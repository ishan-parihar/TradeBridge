version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: mt5-redis-test
    ports:
      - "6379"
    volumes:
      - redis-test-data:/data
    networks:
      - TradeBridge-test-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  tcp-bridge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: tcp-bridge-target
    container_name: mt5-tcp-bridge-test
    environment:
      - MT5_TCP_BRIDGE_PORT=8025
      - MT5_TCP_BRIDGE_HOST=0.0.0.0
      - MT5_REDIS_URL=redis://redis:6379/0
      - MT5_GATEWAY_URL=http://http-gateway:8020
      - PYTHONUNBUFFERED=1
    ports:
      - "8024:8025"
    networks:
      - TradeBridge-test-net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  http-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: http-gateway-target
    container_name: mt5-http-gateway-test
    environment:
      - MT5_GATEWAY_URL=http://0.0.0.0:8020
      - MT5_REDIS_URL=redis://redis:6379/0
      - MT5_TCP_BRIDGE_ENABLED=true
      - MT5_TCP_BRIDGE_PORT=8025
      - PYTHONUNBUFFERED=1
    ports:
      - "8019:8020"
    networks:
      - TradeBridge-test-net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  mcp-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: mcp-server-target
    container_name: mt5-mcp-server-test
    environment:
      - MT5_GATEWAY_URL=http://http-gateway:8020
      - MT5_REDIS_URL=redis://redis:6379/0
      - MT5_TCP_BRIDGE_ENABLED=true
      - MT5_TCP_BRIDGE_PORT=8025
      - PYTHONUNBUFFERED=1
    ports:
      - "8009:8010"
    networks:
      - TradeBridge-test-net
    depends_on:
      http-gateway:
        condition: service_healthy
      tcp-bridge:
        condition: service_healthy
    restart: unless-stopped

networks:
  TradeBridge-test-net:
    driver: bridge
    name: TradeBridge-test-net

volumes:
  redis-test-data:
    name: mt5-redis-test-data
