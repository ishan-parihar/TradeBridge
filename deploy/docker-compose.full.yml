services:
  # ─── Redis (optional message queue / cache) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mt5-redis
    ports:
      - "${MT5_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ─── Combined TradeBridge (TCP + HTTP Gateway + MCP Server) ─────────
  tradebridge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: combined-target
    container_name: mt5-combined
    environment:
      - MT5_MCP_HOST=0.0.0.0
      - MT5_MCP_PORT=8010
      - MT5_GATEWAY_HOST=0.0.0.0
      - MT5_GATEWAY_PORT=8020
      - MT5_TCP_BRIDGE_HOST=0.0.0.0
      - MT5_TCP_BRIDGE_PORT=8025
      - MT5_REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    ports:
      - "${MT5_MCP_PORT:-8010}:8010"
      - "${MT5_GATEWAY_PORT:-8020}:8020"
      - "${MT5_TCP_BRIDGE_PORT:-8025}:8025"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import urllib.request; urllib.request.urlopen("http://127.0.0.1:8010/health", timeout=5)''',
        ]
      interval: 15s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ─── Headless MT5 Terminal (Wine + Xvfb) ───────────────────────────
  mt5-terminal:
    build:
      context: ..
      dockerfile: deploy/mt5-terminal/Dockerfile
    container_name: mt5-terminal
    # Wine needs socket syscalls blocked by Docker's default seccomp profile
    security_opt:
      - seccomp:unconfined
    environment:
      - MT5_BROKER_LOGIN=${MT5_BROKER_LOGIN:-}
      - MT5_BROKER_PASSWORD=${MT5_BROKER_PASSWORD:-}
      - MT5_BROKER_SERVER=${MT5_BROKER_SERVER:-MetaQuotes-Demo}
      - EA_TCP_HOST=tradebridge
      - EA_TCP_PORT=8025
      - DISPLAY=:99
      - WINEDEBUG=-all
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - MT5_CMD_OPTIONS=
      - MT5_ENABLE_VNC=
    ports:
      - "${MT5_TERMINAL_VNC_PORT:-5900}:5900"
    volumes:
      - mt5-config:/config
    depends_on:
      tradebridge:
        condition: service_healthy
    restart: on-failure:2

volumes:
  redis-data:
    name: mt5-redis-data
  mt5-config:
    name: mt5-config
